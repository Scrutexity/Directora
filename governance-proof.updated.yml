name: governance-proof

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  proof:
    name: ultimate-governance-check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout  # v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python  # v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies (lockfile)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Run governance proof
        run: |
          ./tests/governance/ultimate-governance-check.sh

      - name: Upload contract snapshot (artifact)  # v4
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: brief-api-contract
          path: shared/brief-api-contract.json
          retention-days: 30
