# Locust config for the sign-off load test.
# Run with:
#   locust --config tests/load/locust.conf

locustfile = tests/load/sign_off_load_test.py
host = http://localhost:8000
users = 50
spawn-rate = 10
run-time = 60s
headless = true
csv = tests/load/results
html = tests/load/report.html
loglevel = INFO
