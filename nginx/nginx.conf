events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Inject Apple PWA meta tags + manifest link into every HTML response
    # sub_filter runs before the response leaves nginx — Open WebUI never needs changes.
    sub_filter_types text/html;
    sub_filter_once  on;

    upstream openwebui  { server openwebui:8080; }
    upstream birkin_api { server birkin-api:8000; }

    server {
        listen 80;
        server_name _;

        # ── Birkin API ─────────────────────────────────────────────────────
        location /api/skills/   { proxy_pass http://birkin_api; include /etc/nginx/conf.d/proxy.conf*; }
        location /api/widget/   { proxy_pass http://birkin_api; include /etc/nginx/conf.d/proxy.conf*; }
        location /api/schedules { proxy_pass http://birkin_api; include /etc/nginx/conf.d/proxy.conf*; }
        location /api/costs     { proxy_pass http://birkin_api; include /etc/nginx/conf.d/proxy.conf*; }
        location /api/notifications { proxy_pass http://birkin_api; include /etc/nginx/conf.d/proxy.conf*; }
        location /health        { proxy_pass http://birkin_api; }

        # ── Static PWA assets ───────────────────────────────────────────────
        location /manifest.json {
            alias /usr/share/nginx/html/static/manifest.json;
            add_header Cache-Control "public, max-age=3600";
        }

        location /apple-touch-icon.png {
            alias /usr/share/nginx/html/static/apple-touch-icon.png;
            add_header Cache-Control "public, max-age=86400";
        }

        location /icon-192.png {
            alias /usr/share/nginx/html/static/icon-192.png;
            add_header Cache-Control "public, max-age=86400";
        }

        location /icon-512.png {
            alias /usr/share/nginx/html/static/icon-512.png;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── Open WebUI (chat frontend) ──────────────────────────────────────
        location / {
            proxy_pass http://openwebui;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Open WebUI live updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Inject Apple PWA meta tags + manifest link before </head>
            sub_filter '</head>'
                '<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Birkin">
<meta name="theme-color" content="#0A0F1A">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>';
        }
    }
}
